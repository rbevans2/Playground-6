<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6b2035" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Playground Log" />
  <title>Upper Providence Playground Safety Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand-row">
      <div class="seal">UPT</div>
      <div>
        <h1>Upper Providence Township</h1>
        <p>Playground Safety Log</p>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <nav class="bottom-nav">
    <button data-view="home" class="nav-btn active">Playgrounds</button>
    <button data-view="history" class="nav-btn">History</button>
    <button data-view="settings" class="nav-btn">Settings</button>
  </nav>

  <template id="home-template">
    <section class="screen home-screen">
      <div class="compliance-card" id="complianceCard"></div>
      <h2>Select Playground</h2>
      <div id="playgroundCards" class="card-grid"></div>
    </section>
  </template>

  <template id="inspection-template">
    <section class="screen inspection-screen">
      <button class="back-btn" id="backHome">← Back</button>
      <h2 id="inspectionTitle"></h2>
      <div class="form-card meta-card">
        <label>Date
          <input type="date" id="inspectionDate" />
        </label>
        <label>Time
          <input type="time" id="inspectionTime" />
        </label>
        <label>Inspector
          <select id="inspectorSelect"></select>
        </label>
      </div>

      <div class="section-title">Playground Components</div>
      <div id="componentItems"></div>

      <div class="section-title">General Comments</div>
      <textarea id="generalComments" rows="4" placeholder="General notes, conditions observed, or actions taken."></textarea>

      <div class="section-title">Overall Playground Status</div>
      <div class="status-row overall-row">
        <button class="overall-btn selected" data-status="Open">Open</button>
        <button class="overall-btn warn" data-status="Needs Maintenance">Needs Maintenance</button>
        <button class="overall-btn danger" data-status="Closed">Closed</button>
      </div>
      <label class="full-note">Reason if maintenance/closed
        <textarea id="statusReason" rows="3"></textarea>
      </label>

      <div class="section-title">Inspector Signature</div>
      <div class="signature-card">
        <canvas id="signaturePad" aria-label="Inspector signature box"></canvas>
        <div class="signature-actions">
          <button type="button" id="clearSignature" class="mini-btn">Clear Signature</button>
          <span class="small-note">Sign with finger or Apple Pencil.</span>
        </div>
      </div>

      <div class="action-row">
        <button id="saveInspection" class="primary-btn">Save Inspection</button>
        <button id="printInspection" class="secondary-btn">Official Report / PDF</button>
      </div>
    </section>
  </template>

  <template id="history-template">
    <section class="screen">
      <h2>Inspection History</h2>
      <div class="history-actions">
        <select id="historyFilter"></select>
        <button id="exportJson" class="secondary-btn">Export Backup</button>
        <button id="clearAll" class="danger-btn">Clear All</button>
      </div>
      <div id="historyList"></div>
    </section>
  </template>

  <template id="settings-template">
    <section class="screen">
      <h2>Settings</h2>
      <div class="form-card">
        <label>Inspector Names</label>
        <textarea id="inspectorNames" rows="9"></textarea>
        <button id="saveSettings" class="primary-btn">Save Settings</button>
      </div>
      <div class="small-note">Records are saved on this device. Use Export Backup regularly if inspections need to be retained outside this iPhone/iPad.</div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
